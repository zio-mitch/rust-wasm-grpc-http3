<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust WASM App</title>
    <style>
        body { background-color: #f4f7f6; margin: 0; }
    </style>
</head>
<body>
    <div id="sycamore-app"></div>

    <script type="module">
        // Importiamo l'inizializzatore dal volume 'app_artifact' (mappato in /wasm)
        import init from './wasm/app_wasm.js';

        async function run() {
            try {
                // Inizializza il modulo WASM
                await init();
                console.log("WASM Caricato con successo via HTTP/3");
            } catch (e) {
                console.error("Errore nel caricamento WASM:", e);
            }
        }

        run();
    </script>
</body>
</html>
