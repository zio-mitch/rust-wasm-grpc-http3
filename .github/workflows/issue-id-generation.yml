name: "Issue ID generation"

on:
  issues:
    types: [opened, labeled]

jobs:
  assign-id:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Get Current Year
        id: date
        run: echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT

      - name: Process Issue ID
        uses: actions/github-script@v7
        with:
          script: |
            const year = "${{ steps.date.outputs.year }}";
            const issue = context.payload.issue;
            const labels = issue.labels.map(l => l.name.toLowerCase());
            
            let prefix = "";
            if (labels.includes('feature') || labels.includes('fr')) prefix = "FR";
            else if (labels.includes('bug') || labels.includes('br')) prefix = "BR";
            
            const placeholder = `${prefix}-${year}-XXXXX`;
            if (!prefix || !issue.title.includes(placeholder)) {
              return;
            }

            const allIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });

            const regexFixedId = new RegExp(`^${prefix}-${year}-\\d{5}`);
            const existingIds = allIssues.data
              .map(i => i.title)
              .filter(title => regexFixedId.test(title));

            const nextNumber = String(existingIds.length + 1).padStart(5, '0');
            const newID = `${prefix}-${year}-${nextNumber}`;
            
            const newTitle = issue.title.replace(placeholder, newID);

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              title: newTitle
            });

            console.log(`Replaced ${placeholder} with ${newID}`);